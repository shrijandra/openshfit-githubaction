name: Deploy to OpenShift

on:
  push:
    branches:
      - main

defaults:
    run:
      shell: powershell
env:
  IMAGE_NAME: shrijandra/demo-app
  #RUNNER_TEMP: C:\runner-temp
  ACTIONS_RUNNER_DO_NOT_CHOWN: true
  GITHUB_ACTIONS_RUNNER_FORCE_CHOWN: false
       
jobs:
  build-and-deploy:
    runs-on: self-hosted #ubuntu-latest testing
  
    steps:
      - name: Clean workspace (safe cleanup)
        run: |
          Remove-Item -Recurse -Force "$env:GITHUB_WORKSPACE\*" -ErrorAction SilentlyContinue
      - name: Wait for file handles to release
        run: Start-Sleep -Seconds 5
      - name: Clean temp folder
        run: |
          Remove-Item -Recurse -Force "$env:RUNNER_TEMP\*" -ErrorAction SilentlyContinue
      - name: Wait for file handles to release
        run: Start-Sleep -Seconds 5
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false
          persist-credentials: false

      - name: Login to Container Registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ secrets.REGISTRY_URL }} -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin
        
      - name: Print Image Name
        run: |
          echo "Building image: ${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest"
          
      - name: Build Image
        run: docker build -t ${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest .

      - name: Push Image
        run: docker push ${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest

   #   - name: Install oc CLI
    #    run: |
     #     curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/oc/latest/linux/oc.tar.gz
     #     tar -xvf oc.tar.gz
     #     sudo mv oc /usr/local/bin/  

      - name: Login to OpenShift
        run: |
          oc login ${{ secrets.OPENSHIFT_SERVER }} \
          --token=${{ secrets.OPENSHIFT_TOKEN }} \
          --insecure-skip-tls-verify=true

      - name: Deploy App
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest|g" deployment.yaml
          oc apply -f deployment.yaml
          oc apply -f service.yaml
          oc apply -f route.yaml
