name: Deploy to OpenShift
on:
  push:
    branches:
      - main

defaults:
  run:
    shell: powershell  # Fixed from pwsh

env:
  IMAGE_NAME: shrijandra/demo-app

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Manual Workspace Cleanup
        run: |
          if (Test-Path "$env:GITHUB_WORKSPACE") {
            Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Exclude "_*" | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Manual Git Checkout
        run: |
          git config --global core.longpaths true
          # Note: No extra slashes, and correctly formatted variable
          git clone --depth 1 "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@://github.com{{ github.repository }}.git" .
          git checkout ${{ github.sha }}


      - name: Login to Container Registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ secrets.REGISTRY_URL }} -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

      - name: Build and Push Image
        run: |
          $FULL_TAG="${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest"
          docker build -t $FULL_TAG .
          docker push $FULL_TAG

      - name: Login to OpenShift
        run: |
          oc login ${{ secrets.OPENSHIFT_SERVER }} `
            --token=${{ secrets.OPENSHIFT_TOKEN }} `
            --insecure-skip-tls-verify=true

      - name: Deploy App
        run: |
          $FULL_TAG="${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest"
          # Native PowerShell replacement
          (Get-Content deployment.yaml).Replace('IMAGE_PLACEHOLDER', $FULL_TAG) | Set-Content deployment.yaml
          oc apply -f deployment.yaml
          oc apply -f service.yaml
          oc apply -f route.yaml

