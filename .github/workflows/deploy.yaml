name: Deploy to OpenShift
on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: shrijandra/demo-app

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          clean: false
          persist-credentials: false
          fetch-depth: 1
          submodules: false
        continue-on-error: true

      - name: Verify checkout succeeded
        shell: cmd
        run: |
          if not exist "%GITHUB_WORKSPACE%\deployment.yaml" (
            echo ERROR: Checkout failed - deployment.yaml missing
            exit /b 1
          )
          echo Checkout verified OK

      - name: Login to Container Registry
        shell: cmd
        run: echo ${{ secrets.REGISTRY_PASSWORD }}| docker login ${{ secrets.REGISTRY_URL }} -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

      - name: Build and Push Image
        shell: cmd
        run: |
          docker build -t ${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest

      - name: Setup OpenShift Environment
        shell: cmd
        run: |
          FOR /f "tokens=*" %%i IN ('crc oc-env') DO (
            SET "line=%%i"
            SETLOCAL ENABLEDELAYEDEXPANSION
            FOR /f "tokens=2,3 delims= = " %%a IN ("!line!") DO (
              IF /I "%%a"=="PATH" (
                echo %%~b>> %GITHUB_PATH%
              ) ELSE (
                echo %%a=%%~b>> %GITHUB_ENV%
              )
            )
            ENDLOCAL
          )
        
      - name: Login to OpenShift
        shell: cmd
        run: oc login ${{ secrets.OPENSHIFT_SERVER }} --token=${{ secrets.OPENSHIFT_TOKEN }} --insecure-skip-tls-verify=true

      - name: Deploy App
        shell: pwsh
        run: |
          $FULL_TAG="${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest"
          (Get-Content deployment.yaml).Replace('IMAGE_PLACEHOLDER', $FULL_TAG) | Set-Content deployment.yaml
          oc apply -f deployment.yaml
          oc apply -f service.yaml
          oc apply -f route.yaml
